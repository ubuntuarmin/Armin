<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Two Wheel Clothing</title>
  <meta name="description" content="Contact Two Wheel Clothing support for orders, sizing, shipping, and product questions.">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--fire:#FF4500;--bg:#0D0D0D;--panel:#171717;--muted:rgba(255,255,255,.68);--border:rgba(255,255,255,.14)}
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,sans-serif;background:var(--bg);color:#fff}
    .wrap{max-width:900px;margin:auto;padding:32px 20px 56px}.logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:#fff;text-decoration:none}.logo span{color:var(--fire)}
    .head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}.nav a{color:var(--muted);text-decoration:none;margin-left:12px}.nav a:hover,.nav a.active{color:var(--fire)}
    .hero{padding:24px;border:1px solid var(--border);border-radius:14px;background:linear-gradient(135deg,#151515,#241005)}
    h1{font-family:'Bebas Neue',sans-serif;font-size:2.7rem;letter-spacing:1px}.lead{margin-top:8px;color:var(--muted);line-height:1.7}
    .grid{display:grid;grid-template-columns:1.2fr .8fr;gap:14px;margin-top:14px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px}
    label{display:block;margin-bottom:6px;color:#ffb38d;font-size:.86rem} input,textarea{width:100%;padding:11px 12px;background:#111;border:1px solid var(--border);border-radius:8px;color:#fff;margin-bottom:10px}
    textarea{min-height:120px;resize:vertical} button{background:linear-gradient(135deg,var(--fire),#c93a00);border:none;color:#fff;padding:11px 14px;border-radius:8px;font-weight:700;cursor:pointer}
    .meta p{color:var(--muted);line-height:1.75;font-size:.94rem;margin-bottom:10px}
    @media(max-width:860px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head"><a class="logo" href="index.html">TWO <span>WHEEL</span></a><nav class="nav"><a href="index.html">Home</a><a href="shop.html">Shop</a><a href="contact.html" class="active">Contact</a><a href="faq.html">FAQ</a></nav></div>
    <section class="hero"><h1>Contact Us</h1><p class="lead">Our team is here to help with orders, product questions, shipping, and returns.</p></section>
    <section class="grid">
      <article class="card"><label for="name">Name</label><input id="name" type="text" placeholder="Your name"><label for="email">Email</label><input id="email" type="email" placeholder="you@example.com"><label for="topic">Topic</label><input id="topic" type="text" placeholder="Order help, sizing, returns..."><label for="message">Message</label><textarea id="message" placeholder="How can we help?"></textarea><button onclick="sendMsg()">Send Message</button><p id="sent" style="color:#87f5a8;font-size:.9rem;margin-top:10px;"></p></article>
      <aside class="card meta"><p><strong>Support Hours</strong><br>Monday–Friday · 9:00 AM–6:00 PM CST</p><p><strong>Email</strong><br>support@twowheel.example</p><p><strong>Response Time</strong><br>Usually within 1 business day.</p><p><strong>For order updates</strong><br>Use our <a href="order-tracking.html" style="color:var(--fire);text-decoration:none;">Order Tracking</a> page.</p></aside>
    </section>
  </main>
  <script>function sendMsg(){document.getElementById('sent').textContent='Thanks! Your message was sent successfully.';}</script>
</body>
</html>
