<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Tracking | Two Wheel Clothing</title>
  <meta name="description" content="Track your Two Wheel Clothing order using order number and email address.">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--fire:#FF4500;--bg:#0D0D0D;--panel:#171717;--muted:rgba(255,255,255,.68);--border:rgba(255,255,255,.14)}
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,sans-serif;background:var(--bg);color:#fff}
    .wrap{max-width:760px;margin:auto;padding:34px 20px 56px}.logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:#fff;text-decoration:none}.logo span{color:var(--fire)}
    .nav{margin-top:10px;display:flex;gap:12px;flex-wrap:wrap}.nav a{color:var(--muted);text-decoration:none}.nav a:hover,.nav a.active{color:var(--fire)}
    .card{margin-top:16px;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px}
    h1{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;letter-spacing:1px}.lead{margin-top:8px;color:var(--muted);line-height:1.7}
    .field{margin-top:12px}.field label{display:block;margin-bottom:6px;color:#ffb38d;font-size:.86rem;letter-spacing:.3px}
    .field input{width:100%;padding:12px 13px;background:#111;border:1px solid var(--border);border-radius:8px;color:#fff}
    button{margin-top:14px;background:linear-gradient(135deg,var(--fire),#c93a00);color:#fff;border:none;padding:12px 16px;border-radius:8px;font-weight:700;cursor:pointer}
    .result{margin-top:14px;background:#111;border:1px dashed var(--border);padding:14px;border-radius:10px;color:var(--muted);line-height:1.7;font-size:.94rem}
  </style>
</head>
<body>
  <main class="wrap">
    <a class="logo" href="index.html">TWO <span>WHEEL</span></a>
    <nav class="nav"><a href="index.html">Home</a><a href="shop.html">Shop</a><a href="order-tracking.html" class="active">Order Tracking</a><a href="contact.html">Contact</a></nav>
    <section class="card">
      <h1>Track Your Order</h1>
      <p class="lead">Enter your order details to view shipment status updates.</p>
      <div class="field"><label for="orderNo">Order Number</label><input id="orderNo" type="text" placeholder="TW-12345"></div>
      <div class="field"><label for="email">Email Address</label><input id="email" type="email" placeholder="you@example.com"></div>
      <button onclick="trackOrder()">Check Status</button>
      <div class="result" id="result">Tip: use the order number from your confirmation email.</div>
    </section>
  </main>
  <script>
    function trackOrder(){
      var order=document.getElementById('orderNo').value.trim();
      var email=document.getElementById('email').value.trim();
      var result=document.getElementById('result');
      if(!order||!email){result.textContent='Please enter both order number and email.';return;}
      result.innerHTML='Order <strong>'+order+'</strong> is currently in transit. Last update: <strong>Label created</strong>. Expected delivery in 2–4 business days.';
    }
  </script>
</body>
</html>
